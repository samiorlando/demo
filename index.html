    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: #070318;
            color: #fff;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        :root { --primary: #8b5cf6; --secondary: #2dd4bf; --accent: #f472b6; --bg-deep: #070318; }
        
        .header-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(7,3,24,0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(139,92,246,0.4);
            z-index: 30;
            transition: transform 0.3s ease;
        }
        .header-bar.hidden { transform: translateY(-100%); }
        
        .logo-mini {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-mini img {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            filter: drop-shadow(0 0 10px var(--secondary));
            object-fit: cover;
        }
        .logo-mini span {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, white, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .switch {
            display: flex;
            background: #23173f;
            border-radius: 60px;
            padding: 5px;
            border: 1px solid var(--primary);
            position: relative;
        }
        .switch-option {
            padding: 8px 22px;
            font-size: 14px;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
            z-index: 5;
            text-transform: uppercase;
        }
        .switch-option.active { color: white; }
        .switch-slider {
            position: absolute;
            top: 5px;
            left: 5px;
            height: calc(100% - 10px);
            background: linear-gradient(145deg, var(--primary), #b69dff);
            border-radius: 60px;
            transition: all 0.35s;
            box-shadow: 0 0 18px var(--primary);
        }
        
        .stage {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.6s, opacity 0.4s;
            border-radius: 32px 32px 0 0;
            overflow: hidden;
            background: rgba(15,6,35,0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(139,92,246,0.4);
        }
        .layer.audio-layer {
            z-index: 10;
            transform: translateY(0);
            opacity: 1;
        }
        .layer.video-layer {
            z-index: 8;
            transform: translateY(100%);
            opacity: 0;
            background: #03000f;
        }
        .layer.video-layer.active {
            transform: translateY(0);
            opacity: 1;
            z-index: 20;
        }
        .layer.audio-layer.hide {
            transform: translateY(-100%);
            opacity: 0;
            z-index: 5;
        }
        
        .audio-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            padding: 10px 16px 5px;
            overflow-y: auto;
        }
        .logo-big {
            margin: 0px 0 5px;
            animation: float 4s infinite alternate;
        }
        .logo-big img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 0 40px var(--primary)) drop-shadow(0 0 70px var(--secondary));
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-18px) scale(1.07); }
        }
        
        .bars {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 6px;
            height: 120px;
        }
        .bar {
            width: 9px;
            background: var(--primary);
            border-radius: 8px 8px 0 0;
            transition: height 0.1s;
            box-shadow: 0 0 15px currentColor;
        }
        
        .controls-panel {
            width: 100%;
            max-width: 550px;
            margin-top: 0;
        }
        .progress-track {
            height: 8px;
            background: #ffffff15;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #6b21a8;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #ccc;
            margin: 4px 0 8px;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 12px 0 8px;
        }
        .ctrl-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--primary);
            color: white;
            font-size: 22px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
        }
        .ctrl-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }
        .ctrl-btn.big {
            width: 75px;
            height: 75px;
            background: linear-gradient(145deg, var(--primary), #b69dff);
            border: none;
            box-shadow: 0 0 40px var(--primary);
        }
        .volume-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 5px 0 12px;
        }
        .volume-slider {
            width: 140px;
            height: 6px;
            background: #ffffff30;
            border-radius: 10px;
            -webkit-appearance: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--secondary);
            border: 2px solid var(--primary);
        }
        
        .social-links-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .social-link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(139,92,246,0.2);
            border: 2px solid var(--primary);
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }
        .social-link-item i {
            font-size: 22px;
            color: var(--primary);
        }
        .social-link-item:hover {
            transform: scale(1.2);
            background: var(--primary);
        }
        .social-link-item:hover i { color: white; }
        
        .contact-info {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 14px;
        }
        .contact-item i { color: var(--primary); }
        
        .footer-credit {
            margin-top: 8px;
            font-size: 14px;
            color: #aaa;
            border-top: 1px dashed #5b21b6;
            padding: 6px 0;
            width: 100%;
            text-align: center;
        }
        .footer-credit a {
            color: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .footer-credit a:hover {
            color: var(--accent);
            transform: scale(1.05);
        }
        
        /* VIDEO - RESPONSIVE SIN RECORTE */
        .video-container {
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
            transition: transform 0.3s ease;
        }
        
        #videoElement.rotated-clockwise,
        #videoElement.rotated-manual {
            transform: rotate(90deg);
            width: auto !important;
            height: auto !important;
            max-width: 100vh;
            max-height: 100vw;
            object-fit: contain;
        }
        
        .video-controls-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            border-top: 1px solid var(--primary);
            transition: transform 0.3s ease;
            z-index: 50;
        }
        .video-controls-bar.hidden { transform: translateY(100%); }
        .video-progress {
            flex: 1;
            height: 8px;
            background: #ffffff20;
            border-radius: 12px;
            cursor: pointer;
        }
        .video-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 12px;
        }
        .video-time {
            min-width: 100px;
            color: white;
            font-size: 14px;
            font-family: monospace;
        }
        
        .rotate-btn {
            background: rgba(139,92,246,0.5);
            border: 2px solid var(--primary);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 70px;
            right: 20px;
            z-index: 45;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
        }
        .rotate-btn:hover { 
            background: var(--primary);
            transform: scale(1.1);
        }
        .rotate-btn.rotated {
            background: var(--secondary);
            border-color: var(--secondary);
        }
        
        .float-actions {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 45;
            transition: opacity 0.3s;
        }
        .float-actions.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .float-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #00000070;
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .float-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }
        
        .hidden { display: none !important; }
        .rotate-animation { animation: spin 0.5s; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .status-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid var(--primary);
            font-size: 13px;
            z-index: 100;
            display: none;
            white-space: nowrap;
        }
        .status-toast.show {
            display: block;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
        
        .share-dropdown {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b123b;
            border-radius: 30px;
            padding: 8px;
            display: none;
            flex-direction: column;
            border: 1px solid var(--primary);
            z-index: 100;
            min-width: 200px;
        }
        .share-dropdown.show { display: flex; }
        .share-option {
            padding: 12px 22px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .share-option:hover { background: var(--primary); }
        
        .install-floating-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f5a97f, #f5b97f, #f5c97f, #c084fc, var(--primary));
            background-size: 300% 300%;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 0 40px var(--primary);
            cursor: pointer;
            z-index: 1000;
            animation: gradientMove 3s infinite alternate, pulseGlow 2s infinite, bounce 2s infinite;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .install-floating-btn.hidden { display: none; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 30px var(--primary); } 50% { box-shadow: 0 0 60px var(--secondary); } }
        @keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-15px); } }
        
        .reload-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7,3,24,0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .reload-loader.show { display: flex; }
        .reload-loader .spinner {
            width: 70px;
            height: 70px;
            border: 6px solid rgba(139,92,246,0.3);
            border-top-color: #8b5cf6;
            border-right-color: #2dd4bf;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .info-message {
            background: rgba(45,212,191,0.1);
            border-left: 4px solid #2dd4bf;
            border-radius: 8px;
            padding: 10px 15px;
            margin: 10px 0;
            font-size: 12px;
            color: #2dd4bf;
            display: none;
        }
        .info-message.show { display: block; }
        
        .format-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            padding: 3px 8px;
            border-radius: 16px;
            font-size: 9px;
            font-family: monospace;
            color: #2dd4bf;
            z-index: 25;
            backdrop-filter: blur(4px);
        }
        
        @media (max-width: 600px) {
            .install-floating-btn { padding: 12px 25px; font-size: 16px; }
            .logo-mini span { font-size: 18px; }
            .switch-option { padding: 6px 14px; font-size: 12px; }
            .ctrl-btn.big { width: 65px; height: 65px; font-size: 26px; }
            .ctrl-btn { width: 48px; height: 48px; font-size: 20px; }
            .logo-big img { width: 120px; height: 120px; }
        }
    </style>
</head>

   <script>
    (function() {
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const CONFIG = {
            videoUrl: 'https://live20.bozztv.com/akamaissh101/ssh101/gotvperu/playlist.m3u8',
            audioUrl: 'https://sonic.dattassd.com/8132/stream',
            posterUrl: '',
            logoUrl: 'https://i.ibb.co/LDM7gRFW/Captura.png',
            playerName: 'La Yapita',
            primaryColor: '#8b5cf6',
            backgroundColor: '#070318',
            themeColor: '#13082c',
            mostrarVideo: 1
        };
        
        const APP_VERSION = '1774738935';
        
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let currentMode = 'radio';
        let audioCtx, analyser, audioDataArray;
        let animFrame;
        let hls = null;
        let deferredPrompt = null;
        let inactivityTimer;
        let isRotated = false;
        let autoRotated = false;
        let audioPlayer = null;
        let reconnectAttempts = 0;
        let videoReconnectAttempts = 0;
        let stallTimer = null;
        let lastTimeUpdate = 0;
        let videoHealthInterval = null;
        let currentAudioUrl = null;
        const MAX_RECONNECT = 5;
        const MAX_VIDEO_RECONNECT = 5;
        
        const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const tieneVideo = CONFIG.videoUrl && CONFIG.videoUrl.trim() !== '' && CONFIG.mostrarVideo == 1;
        const esHLS = CONFIG.videoUrl && CONFIG.videoUrl.toLowerCase().includes('.m3u8');
        
        // Elementos DOM
        const headerBar = document.getElementById('headerBar');
        const floatActions = document.getElementById('floatActions');
        const videoControls = document.getElementById('videoControls');
        const rotateBtn = document.getElementById('rotateBtn');
        const switchOpts = document.querySelectorAll('.switch-option');
        const switchSlider = document.getElementById('switchSlider');
        const audioLayer = document.getElementById('audioLayer');
        const videoLayer = document.getElementById('videoLayer');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const shareBtn = document.getElementById('shareBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const audioProgressFill = document.getElementById('audioProgressFill');
        const audioCurrent = document.getElementById('audioCurrent');
        const audioDuration = document.getElementById('audioDuration');
        const volumeSlider = document.getElementById('volumeSlider');
        const visualizerBars = document.getElementById('visualizerBars');
        const audioLoading = document.getElementById('audioLoading');
        const audioError = document.getElementById('audioError');
        const videoLoading = document.getElementById('videoLoading');
        const videoError = document.getElementById('videoError');
        const videoPlayBtn = document.getElementById('videoPlayBtn');
        const videoProgressFill = document.getElementById('videoProgressFill');
        const videoTimeDisplay = document.getElementById('videoTimeDisplay');
        const videoProgressWrap = document.getElementById('videoProgressWrap');
        const videoElement = document.getElementById('videoElement');
        const shareDropdown = document.getElementById('shareDropdown');
        const installButton = document.getElementById('installButton');
        const streamInfo = document.getElementById('streamInfo');
        const formatBadge = document.getElementById('formatBadge');
        
        if (formatBadge) {
            if (esHLS) formatBadge.innerHTML = '🎬 HLS';
            else formatBadge.innerHTML = '🎵 Stream';
        }
        
        if (!tieneVideo) {
            const tvOption = document.querySelector('.switch-option[data-mode="tv"]');
            if (tvOption) tvOption.style.display = 'none';
            const radioOption = document.querySelector('.switch-option[data-mode="radio"]');
            if (radioOption) {
                switchSlider.style.width = radioOption.offsetWidth + 'px';
                switchSlider.style.left = radioOption.offsetLeft + 'px';
            }
            currentMode = 'radio';
            audioLayer.classList.remove('hide');
            videoLayer.classList.remove('active');
        }

        // ============================================
        // AUDIO UNIVERSAL - COMPATIBLE CON TODOS LOS FORMATOS
        // ============================================
        function initAudio() {
            if (audioPlayer) return;
            
            audioPlayer = new Audio();
            audioPlayer.crossOrigin = 'anonymous';
            audioPlayer.preload = 'auto';
            audioPlayer.volume = volumeSlider?.value || 1;
            
            // Eventos de audio
            audioPlayer.onplay = () => {
                playIcon.className = 'fas fa-pause';
                if (audioLoading) audioLoading.classList.remove('show');
                if (streamInfo) streamInfo.classList.remove('show');
                if (!audioCtx) initAnalyser();
                reconnectAttempts = 0;
            };
            
            audioPlayer.onpause = () => playIcon.className = 'fas fa-play';
            
            audioPlayer.onwaiting = () => { 
                if (audioLoading) audioLoading.classList.add('show');
            };
            
            audioPlayer.oncanplay = () => { 
                if (audioLoading) audioLoading.classList.remove('show');
            };
            
            audioPlayer.onplaying = () => {
                if (audioLoading) audioLoading.classList.remove('show');
            };
            
            audioPlayer.onerror = (e) => {
                const errorCode = audioPlayer.error?.code;
                let errorMsg = 'Error de audio';
                if (errorCode === 2) errorMsg = 'Error de red - Verifica la URL';
                if (errorCode === 3) errorMsg = 'Error de decodificación - Formato no soportado';
                if (errorCode === 4) errorMsg = 'Formato no soportado';
                
                console.error('Audio error:', errorMsg);
                
                if (reconnectAttempts < MAX_RECONNECT) {
                    reconnectAttempts++;
                    const delay = Math.min(2000 * reconnectAttempts, 10000);
                    setTimeout(() => playAudio(), delay);
                } else {
                    if (audioError) {
                        audioError.textContent = errorMsg;
                        audioError.classList.add('show');
                    }
                    setTimeout(() => { if(audioError) audioError.classList.remove('show'); }, 5000);
                }
            };
            
            audioPlayer.ontimeupdate = () => {
                let cur = audioPlayer.currentTime || 0;
                let dur = audioPlayer.duration || 0;
                if (audioCurrent) audioCurrent.textContent = formatTime(cur);
                if (dur && isFinite(dur) && dur > 0) {
                    if (audioDuration) audioDuration.textContent = formatTime(dur);
                    if (audioProgressFill) audioProgressFill.style.width = (cur/dur*100)+'%';
                } else if (audioDuration) {
                    audioDuration.textContent = 'LIVE';
                    if (audioProgressFill) audioProgressFill.style.width = '100%';
                }
                
                if (lastTimeUpdate > 0 && cur === lastTimeUpdate && !audioPlayer.paused && cur > 0) {
                    if (!stallTimer) {
                        stallTimer = setTimeout(() => {
                            console.log('Audio estancado, reconectando');
                            playAudio();
                        }, 8000);
                    }
                } else {
                    if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; }
                    lastTimeUpdate = cur;
                }
            };
        }
        
        function playAudio() {
            if (!CONFIG.audioUrl) return;
            if (!audioPlayer) initAudio();
            
            const url = CONFIG.audioUrl;
            
            // Añadir timestamp anti-caché
            let finalUrl = url;
            const timestamp = Date.now();
            finalUrl = finalUrl + (finalUrl.includes('?') ? '&' : '?') + '_t=' + timestamp;
            
            // Solo cambiar src si es diferente
            if (audioPlayer.src !== finalUrl) {
                audioPlayer.src = finalUrl;
                audioPlayer.load();
            }
            
            // Intentar reproducir
            const playPromise = audioPlayer.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => {
                    console.log('Reproducción automática bloqueada:', e);
                    playIcon.className = 'fas fa-play';
                    if (streamInfo) {
                        streamInfo.innerHTML = '<i class="fas fa-hand-pointer"></i> Haz clic para reproducir';
                        streamInfo.classList.add('show');
                    }
                });
            }
        }
        
        // Función para reintentar con diferentes formatos
        function tryAlternativeFormats() {
            const url = CONFIG.audioUrl;
            const baseUrl = url.split('?')[0];
            
            // Si ya es .ogg, intentar con .mp3
            if (baseUrl.includes('.ogg')) {
                const mp3Url = baseUrl.replace('.ogg', '.mp3') + '?_t=' + Date.now();
                console.log('Intentando formato MP3:', mp3Url);
                audioPlayer.src = mp3Url;
                audioPlayer.load();
                audioPlayer.play().catch(e => console.log('MP3 falló:', e));
            }
        }

        // ============================================
        // VIDEO - CON BUFFER GRANDE Y SIN RECORTE
        // ============================================
        function initVideo() {
            if (!tieneVideo) return;
            
            videoElement.playsInline = true;
            videoElement.setAttribute('playsinline', '');
            
            videoElement.onplay = () => {
                videoPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
                if (videoLoading) videoLoading.classList.remove('show');
            };
            videoElement.onpause = () => videoPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
            videoElement.onwaiting = () => { 
                if (videoLoading) videoLoading.classList.add('show');
            };
            videoElement.oncanplay = () => { 
                if (videoLoading) videoLoading.classList.remove('show');
            };
            videoElement.ontimeupdate = () => {
                let cur = videoElement.currentTime || 0;
                let dur = videoElement.duration || 0;
                if (dur && isFinite(dur) && dur > 0) {
                    videoTimeDisplay.textContent = formatTime(cur) + ' / ' + formatTime(dur);
                    videoProgressFill.style.width = (cur/dur*100) + '%';
                } else {
                    videoTimeDisplay.textContent = '🔴 EN VIVO';
                    videoProgressFill.style.width = '100%';
                }
            };
            videoElement.onerror = () => {
                if (videoReconnectAttempts < MAX_VIDEO_RECONNECT) {
                    videoReconnectAttempts++;
                    const delay = Math.min(2000 * videoReconnectAttempts, 8000);
                    setTimeout(() => playVideo(), delay);
                } else {
                    if (videoError) videoError.classList.add('show');
                    setTimeout(() => { if(videoError) videoError.classList.remove('show'); }, 4000);
                }
            };
        }
        
        function playVideo() {
            if (!tieneVideo) return;
            if (!videoElement) return;
            
            if (videoHealthInterval) {
                clearInterval(videoHealthInterval);
                videoHealthInterval = null;
            }
            
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            videoElement.pause();
            videoElement.src = '';
            
            const videoUrl = CONFIG.videoUrl;
            
            if (esHLS && Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: false,
                    maxBufferLength: 90,
                    maxMaxBufferLength: 120,
                    startLevel: -1,
                    autoStartLoad: true,
                    capLevelToPlayerSize: true,
                    fragLoadingMaxRetry: 6,
                    fragLoadingRetryDelay: 1000,
                    manifestLoadingMaxRetry: 6,
                    manifestLoadingRetryDelay: 1000
                });
                
                hls.loadSource(videoUrl);
                hls.attachMedia(videoElement);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    console.log('✅ HLS cargado');
                    if (currentMode === 'tv') {
                        videoElement.play().catch(e => console.log('Autoplay:', e));
                    }
                    videoReconnectAttempts = 0;
                });
                
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                if (videoReconnectAttempts < MAX_VIDEO_RECONNECT) {
                                    videoReconnectAttempts++;
                                    setTimeout(() => playVideo(), 3000);
                                }
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                break;
                        }
                    }
                });
                
                videoHealthInterval = setInterval(() => {
                    if (currentMode === 'tv' && videoElement && videoElement.paused && !videoElement.ended && videoElement.readyState < 2) {
                        console.log('Stream caído, reconectando...');
                        playVideo();
                    }
                }, 45000);
                
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = videoUrl;
                videoElement.load();
                videoElement.addEventListener('loadedmetadata', () => {
                    if (currentMode === 'tv') videoElement.play().catch(e => console.log(e));
                }, { once: true });
            } else {
                videoElement.src = videoUrl;
                videoElement.load();
                videoElement.addEventListener('loadedmetadata', () => {
                    if (currentMode === 'tv') videoElement.play().catch(e => console.log(e));
                }, { once: true });
            }
        }
        
        // ============================================
        // ROTACIÓN RESPONSIVA SIN RECORTE
        // ============================================
        function toggleRotation() {
            isRotated = !isRotated;
            
            if (isRotated) {
                videoElement.classList.add('rotated-manual');
                videoElement.classList.remove('rotated-clockwise');
                videoElement.style.transform = 'rotate(90deg)';
                rotateBtn.innerHTML = '<i class="fas fa-undo"></i>';
                rotateBtn.classList.add('rotated');
                autoRotated = false;
            } else {
                videoElement.classList.remove('rotated-manual');
                videoElement.style.transform = '';
                rotateBtn.innerHTML = '<i class="fas fa-undo-alt"></i>';
                rotateBtn.classList.remove('rotated');
                
                if (autoRotated) {
                    ajustarVideoMobile();
                }
            }
            resetTimer();
        }
        
        function ajustarVideoMobile() {
            if (!isMobile || currentMode !== 'tv' || isRotated) return;
            
            const isPortrait = window.innerHeight > window.innerWidth;
            
            if (isPortrait && !autoRotated) {
                videoElement.classList.add('rotated-clockwise');
                videoElement.style.transform = 'rotate(90deg)';
                autoRotated = true;
                if (rotateBtn) {
                    rotateBtn.innerHTML = '<i class="fas fa-undo"></i>';
                    rotateBtn.classList.add('rotated');
                }
            } else if (!isPortrait && autoRotated) {
                videoElement.classList.remove('rotated-clockwise');
                videoElement.style.transform = '';
                autoRotated = false;
                if (rotateBtn && !isRotated) {
                    rotateBtn.innerHTML = '<i class="fas fa-undo-alt"></i>';
                    rotateBtn.classList.remove('rotated');
                }
            }
        }
        
        // ============================================
        // VISUALIZADOR
        // ============================================
        function initAnalyser() {
            if (audioCtx || !audioPlayer) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaElementSource(audioPlayer);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                audioDataArray = new Uint8Array(analyser.frequencyBinCount);
                updateVisualizer();
                
                document.addEventListener('click', () => {
                    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                }, { once: true });
            } catch(e) {}
        }
        
        function updateVisualizer() {
            if (!analyser || !audioDataArray || !visualizerBars) {
                animFrame = requestAnimationFrame(updateVisualizer);
                return;
            }
            analyser.getByteFrequencyData(audioDataArray);
            const bars = document.querySelectorAll('.bar');
            const len = bars.length;
            const slice = analyser.frequencyBinCount / len;
            for (let i = 0; i < len; i++) {
                let sum = 0;
                let start = Math.floor(i * slice);
                let end = Math.min(start + slice, analyser.frequencyBinCount);
                for (let j = start; j < end; j++) sum += audioDataArray[j] || 0;
                let avg = (sum / (end - start)) / 255;
                let h = Math.max(6, avg * 80 + 6);
                bars[i].style.height = h + 'px';
                if (h < 35) bars[i].style.background = CONFIG.primaryColor;
                else if (h < 65) bars[i].style.background = '#2dd4bf';
                else bars[i].style.background = '#f472b6';
            }
            animFrame = requestAnimationFrame(updateVisualizer);
        }
        
        function createBars() {
            if (!visualizerBars) return;
            visualizerBars.innerHTML = '';
            let count = window.innerWidth < 550 ? 28 : 42;
            for (let i = 0; i < count; i++) {
                let bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = '4px';
                visualizerBars.appendChild(bar);
            }
        }

        // ============================================
        // UI Y CONTROLES
        // ============================================
        function formatTime(sec) {
            if (!isFinite(sec) || sec === 0) return '00:00';
            let m = Math.floor(sec/60);
            let s = Math.floor(sec%60);
            return `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }
        
        function resetTimer() {
            if (currentMode === 'tv') {
                headerBar.classList.remove('hidden');
                floatActions.classList.remove('hidden');
                videoControls.classList.remove('hidden');
                if (rotateBtn) rotateBtn.classList.remove('hidden');
            }
            if (inactivityTimer) clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                if (currentMode === 'tv') {
                    headerBar.classList.add('hidden');
                    floatActions.classList.add('hidden');
                    videoControls.classList.add('hidden');
                    if (rotateBtn) rotateBtn.classList.add('hidden');
                }
            }, 5000);
        }
        
        function setMode(mode) {
            if (!tieneVideo && mode === 'tv') return;
            
            currentMode = mode;
            const active = document.querySelector(`.switch-option[data-mode="${mode}"]`);
            if (!active) return;
            
            const left = active.offsetLeft;
            switchSlider.style.width = active.offsetWidth + 'px';
            switchSlider.style.left = left + 'px';
            switchOpts.forEach(o => o.classList.remove('active'));
            active.classList.add('active');
            
            if (mode === 'radio') {
                audioLayer.classList.remove('hide');
                videoLayer.classList.remove('active');
                fullscreenBtn?.classList.add('hidden');
                if (videoElement) videoElement.pause();
                if (hls) hls.stopLoad();
                playAudio();
            } else {
                audioLayer.classList.add('hide');
                videoLayer.classList.add('active');
                fullscreenBtn?.classList.remove('hidden');
                if (audioPlayer) audioPlayer.pause();
                playVideo();
                setTimeout(() => ajustarVideoMobile(), 200);
            }
            resetTimer();
        }
        
        function shareTo(platform) {
            const url = window.location.href;
            if (platform === 'whatsapp') window.open(`https://wa.me/?text=${encodeURIComponent(url)}`, '_blank');
            else if (platform === 'facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
            else if (platform === 'copy') navigator.clipboard.writeText(url).then(() => alert('✅ Enlace copiado'));
            shareDropdown.classList.remove('show');
        }

        // ============================================
        // EVENTOS E INICIALIZACIÓN
        // ============================================
        window.addEventListener('resize', () => {
            createBars();
            ajustarVideoMobile();
        });
        
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (hls) hls.stopLoad();
            } else {
                if (currentMode === 'tv' && videoElement && videoElement.paused && videoElement.src) {
                    videoElement.play().catch(e => console.log(e));
                }
            }
        });
        
        ['mousemove', 'touchstart', 'click'].forEach(e => document.addEventListener(e, resetTimer));
        
        if (playPauseBtn) {
            playPauseBtn.addEventListener('click', () => {
                if (audioPlayer?.paused) playAudio();
                else audioPlayer?.pause();
                resetTimer();
            });
        }
        
        if (volumeSlider) {
            volumeSlider.addEventListener('input', e => { if (audioPlayer) audioPlayer.volume = e.target.value; });
        }
        
        if (refreshBtn) {
            refreshBtn.addEventListener('click', () => {
                refreshBtn.classList.add('rotate-animation');
                setTimeout(() => refreshBtn.classList.remove('rotate-animation'), 500);
                if (currentMode === 'radio') {
                    if (audioPlayer) audioPlayer.pause();
                    playAudio();
                } else {
                    if (videoElement) videoElement.pause();
                    if (hls) hls.destroy();
                    playVideo();
                }
                resetTimer();
            });
        }
        
        if (rotateBtn) rotateBtn.addEventListener('click', toggleRotation);
        
        if (videoPlayBtn) {
            videoPlayBtn.addEventListener('click', () => {
                if (videoElement.paused) videoElement.play().catch(e => console.log(e));
                else videoElement.pause();
                resetTimer();
            });
        }
        
        if (videoProgressWrap && videoElement) {
            videoProgressWrap.addEventListener('click', e => {
                let rect = videoProgressWrap.getBoundingClientRect();
                let pos = (e.clientX - rect.left) / rect.width;
                videoElement.currentTime = pos * (videoElement.duration || 0);
                resetTimer();
            });
        }
        
        if (fullscreenBtn) {
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    videoLayer.requestFullscreen?.() || videoLayer.webkitRequestFullscreen?.();
                    fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
                resetTimer();
            });
        }
        
        if (shareBtn) {
            shareBtn.addEventListener('click', e => {
                e.stopPropagation();
                shareDropdown.classList.toggle('show');
                resetTimer();
            });
        }
        
        document.addEventListener('click', () => shareDropdown?.classList.remove('show'));
        
        document.querySelectorAll('.share-option').forEach(opt => {
            opt.addEventListener('click', () => shareTo(opt.dataset.platform));
        });
        
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            if (installButton) installButton.classList.remove('hidden');
        });
        
        if (installButton) {
            installButton.addEventListener('click', async () => {
                if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                    alert('📱 Compartir → Agregar a pantalla de inicio');
                    return;
                }
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    installButton.classList.add('hidden');
                }
            });
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        if (tieneVideo) {
            initVideo();
            switchOpts.forEach(opt => opt.addEventListener('click', () => setMode(opt.dataset.mode)));
        }
        
        createBars();
        initAudio();
        playAudio();
        setMode('radio');
        resetTimer();
        
        // Verificar versión
        const versionKey = 'reproductor_version_' + window.location.pathname.split('/')[2];
        const oldVersion = localStorage.getItem(versionKey);
        if (!oldVersion) localStorage.setItem(versionKey, APP_VERSION);
        else if (oldVersion !== APP_VERSION) {
            localStorage.setItem(versionKey, APP_VERSION);
            setTimeout(() => window.location.reload(), 500);
        }
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=' + APP_VERSION).catch(e => console.log('SW error:', e));
        }
        
        console.log('✅ Reproductor listo - Audio universal, Video 16:9 sin recorte');
    })();
    </script>
